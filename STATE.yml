project: finuchet
repository_state:
  git_workflow: enforced
  secrets_in_git: false
  db_data_in_git: false
  backup_artifacts_in_git: false
  docs_inventory:
    readme: true
    architecture_doc: true
    runbook_doc: true
    env_example: true
runtime:
  server_path: /root/bot_finuchet
  service: finuchet.service
  database: postgresql
notes:
  - Keep environment secrets only in /root/bot_finuchet/.env and/or /root/.env
  - Apply changes via branch -> PR -> merge
  - Any DB schema change must be added as a SQL file in migrations/
