project: finuchet
repository_state:
  git_workflow: enforced
  secrets_in_git: false
  db_data_in_git: false
  backup_artifacts_in_git: false
  docs_inventory:
    readme: true
    architecture_doc: true
    runbook_doc: true
    env_example: true
runtime:
  server_path: /root/bot_finuchet
  service: finuchet.service
  database: postgresql
notes:
  - Keep environment secrets only in /root/bot_finuchet/.env and/or /root/.env
  - Apply changes via branch -> PR -> merge
  - Any DB schema change must be added as a SQL file in migrations/

migrations:
  latest_migrations:
    - 20260226_001_action_tokens_pending_op.sql
    - 20260226_002_action_tokens_ttl_cleanup.sql
    - 20260226_007_ml_observations.sql

stage_2_0:
  added_files:
    - services/ml_prep.py
    - migrations/20260226_007_ml_observations.sql
  db_tables:
    - public.ml_observations
  db_api:
    - db.queries.insert_ml_observation
    - db.queries.update_ml_observation_choice
  observation_actions:
    - suggest_shown
    - pick_cat
    - toggle_type
    - other_category
    - fallback_direct_write
    - parse_failed

stage_2_1:
  added_files:
    - services/ml_suggest.py
  updated_files:
    - routers/messages.py
    - routers/callbacks.py
    - db/queries.py
    - ui/keyboards.py
  baseline_logic:
    - local_alias
    - global_alias
    - user_frequency_prior_last_50_ops
  ui_buttons:
    - "✅ <cat1>"
    - "✅ <cat2>"
    - "✍️ Другая категория"
    - "🔁 Доход/Расход"

stage_2_2:
  added_files:
    - services/ml_bias.py
  updated_files:
    - services/ml_suggest.py
    - db/queries.py
    - routers/messages.py
    - routers/callbacks.py
    - routers/commands.py
    - main.py
  metrics:
    - top1_hit
    - top2_hit
  command:
    - /mlstats

stage_2_3:
  added_files:
    - services/ml_model.py
    - services/ml_train.py
    - services/ml_infer.py
  updated_files:
    - db/database.py
    - db/queries.py
    - services/ml_suggest.py
    - routers/messages.py
    - routers/callbacks.py
    - routers/commands.py
    - jobs/daily.py
    - main.py
    - settings.py
  model:
    - tfidf_vectorizer
    - logistic_regression
  artifacts_dir: _ml_artifacts
  commands:
    - /mlstats
    - /mltrain

stage_2_4:
  updated_files:
    - routers/commands.py
    - routers/callbacks.py
    - routers/messages.py
    - db/queries.py
    - main.py
  limits_ux:
    - /limits
    - list -> card -> edit/delete
    - period conflict resolution (merge/replace)
  callbacks:
    - lim_list
    - lim_open
    - lim_edit_amount
    - lim_edit_period
    - lim_conflict_replace
    - lim_del / lim_del_yes
